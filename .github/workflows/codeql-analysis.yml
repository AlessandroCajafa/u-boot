name: "CodeQL Analysis"

on:
  push:
    branches: [ master ]
  # Aggiungiamo questo (punto 1 dei tuoi suggerimenti) per poterlo lanciare a mano
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        # Installiamo python-is-python3 che crea il link simbolico per "python"
        # E installiamo le librerie di sviluppo python
        sudo apt-get install -y bc bison flex libssl-dev make gcc libsdl1.2-dev python3-dev
        # Creiamo un link manuale per python2 così U-Boot non si lamenta
        sudo ln -sf /usr/bin/python3 /usr/bin/python2

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: cpp
        # Fondamentale dallo screenshot: evita che CodeQL chiuda il database troppo presto
        build-mode: manual
        # Usiamo il "+" per FORZARE l'aggiunta della tua query a quelle di sistema
        queries: +./.github/queries/11_taint_tracking_input_val.ql

    - name: Configure and Build U-Boot
      run: |
        set -xe
        make HOSTCFLAGS="-fcommon" qemu-x86_defconfig
        
        # Abilitiamo i moduli necessari
        echo "CONFIG_NET=y" >> .config
        echo "CONFIG_NET_TFTP_VARS=y" >> .config
        
        make HOSTCFLAGS="-fcommon" olddefconfig
        
        # Compiliamo solo quello che ci serve, ignorando i tool grafici o script che rompono
        # Se net/net.o fallisce, almeno vedremo il perché specifico nel log
        make HOSTCFLAGS="-fcommon" net/net.o || echo "Errore su net.o, controllo log"
        make HOSTCFLAGS="-fcommon" net/nfs.o || echo "Errore su nfs.o"
        make HOSTCFLAGS="-fcommon" net/tftp.o || echo "Errore su tftp.o"

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
