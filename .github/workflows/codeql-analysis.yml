name: "CodeQL Analysis"

on:
  push:
    branches: [ master ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- AGGIUNGIAMO QUESTO STEP ---
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison flex libssl-dev make gcc libsdl1.2-dev
    # -------------------------------

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: cpp
        config-file: ./.github/codeql-config.yml

    - name: Configure and Build U-Boot
      run: |
        make HOSTCFLAGS="-fcommon" sandbox_defconfig
        # Abilitiamo manualmente i protocolli di rete nella configurazione
        echo "CONFIG_NET=y" >> .config
        echo "CONFIG_CMD_NET=y" >> .config
        echo "CONFIG_NET_TFTP_VARS=y" >> .config
        
        # Aggiorniamo la configurazione basandoci sui nuovi flag
        make HOSTCFLAGS="-fcommon" olddefconfig
        
        # Ora compiliamo i file bersaglio
        make HOSTCFLAGS="-fcommon" net/net.o net/nfs.o net/tftp.o net/bootp.o
        make HOSTCFLAGS="-fcommon" -j2

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
