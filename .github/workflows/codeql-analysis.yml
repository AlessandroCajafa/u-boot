name: "CodeQL Analysis"

on:
  push:
    branches: [ master ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- AGGIUNGIAMO QUESTO STEP ---
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison flex libssl-dev make gcc libsdl1.2-dev
    # -------------------------------

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3  # o v4, se preferisci aggiornare
      with:
        languages: cpp
        build-mode: manual
        # Usiamo il "+" per dire: "Esegui le tue standard MA AGGIUNGI anche la mia"
        queries: +./.github/queries/11_taint_tracking_input_val.ql

    - name: Build U-Boot
      run: |
        set -xe 
        sudo apt-get update
        sudo apt-get install -y bc bison flex libssl-dev make gcc libsdl1.2-dev
        
        make HOSTCFLAGS="-fcommon" sandbox_defconfig
        # Forza la compilazione degli oggetti di rete
        make HOSTCFLAGS="-fcommon" net/net.o net/nfs.o net/tftp.o net/bootp.o
        make HOSTCFLAGS="-fcommon" -j$(nproc)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
