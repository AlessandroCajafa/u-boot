name: "CodeQL Analysis"

on:
  push:
    branches: [ master ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- AGGIUNGIAMO QUESTO STEP ---
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison flex libssl-dev make gcc libsdl1.2-dev
    # -------------------------------

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: cpp
        queries: ./.github/queries/11_taint_tracking_input_val.ql 

    - name: Configure and Build U-Boot
      run: |
        make HOSTCFLAGS="-fcommon" sandbox_defconfig
        # Compiliamo esplicitamente la cartella net/ per far scattare la trappola
        make HOSTCFLAGS="-fcommon" net/
        make HOSTCFLAGS="-fcommon" -j2

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
