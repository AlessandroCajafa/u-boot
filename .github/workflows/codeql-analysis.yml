name: "CodeQL Analysis"

on:
  push:
    branches: [ master ]
  # Aggiungiamo questo (punto 1 dei tuoi suggerimenti) per poterlo lanciare a mano
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison flex libssl-dev make gcc libsdl1.2-dev

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: cpp
        # Fondamentale dallo screenshot: evita che CodeQL chiuda il database troppo presto
        build-mode: manual
        # Usiamo il "+" per FORZARE l'aggiunta della tua query a quelle di sistema
        queries: +./.github/queries/11_taint_tracking_input_val.ql

    - name: Build U-Boot (Manual)
      run: |
        # Usiamo i comandi dal tuo screenshot per sicurezza
        make HOSTCFLAGS="-fcommon" sandbox_defconfig
        # Forza la compilazione del codice di rete (dove c'è il tuo bug)
        make HOSTCFLAGS="-fcommon" net/net.o net/nfs.o net/tftp.o net/bootp.o
        make HOSTCFLAGS="-fcommon" -j$(nproc)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
