name: "CodeQL Analysis"

on:
  push:
    branches: [ master ]
  # Aggiungiamo questo (punto 1 dei tuoi suggerimenti) per poterlo lanciare a mano
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison flex libssl-dev make gcc libsdl1.2-dev

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: cpp
        # Fondamentale dallo screenshot: evita che CodeQL chiuda il database troppo presto
        build-mode: manual
        # Usiamo il "+" per FORZARE l'aggiunta della tua query a quelle di sistema
        queries: +./.github/queries/11_taint_tracking_input_val.ql

    - name: Configure and Build U-Boot
      run: |
        # Usiamo una configurazione più ricca rispetto alla sandbox
        make HOSTCFLAGS="-fcommon" qemu-x86_defconfig
        
        # Forziamo l'inclusione dei protocolli di rete nel .config
        echo "CONFIG_NET=y" >> .config
        echo "CONFIG_NET_TFTP_VARS=y" >> .config
        echo "CONFIG_BOOTP_MAY_FAIL=y" >> .config
        
        make HOSTCFLAGS="-fcommon" olddefconfig
        
        # Compiliamo i file dove la tua query ha trovato i bug in locale
        # Se i tuoi file erano net/nfs.c o net/tftp.c, ora verranno inclusi
        make HOSTCFLAGS="-fcommon" net/net.o net/nfs.o net/tftp.o net/bootp.o

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
